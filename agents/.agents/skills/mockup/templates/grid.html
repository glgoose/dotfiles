<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TOPIC}} — variants</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="../_tokens.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      margin: 0;
    }
    .topic-h {
      font-size: 1rem;
      font-weight: 600;
      color: #475569;
      margin: 0 0 0.25rem;
    }
    .hint {
      font-size: 0.78rem;
      color: #94a3b8;
      margin: 0 0 1.5rem;
    }
    .hint code {
      background: #fff;
      border: 1px solid #e5e2e2;
      border-radius: 4px;
      padding: 0.05rem 0.35rem;
      font-size: 0.72rem;
    }
    .variants-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }
    .variant-card {
      background: #fff;
      border: 1px solid #e5e2e2;
      border-radius: 10px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }
    .variant-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #94a3b8;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .variant-desc {
      font-size: 0.78rem;
      color: #64748b;
      margin-bottom: 0.3rem;
      line-height: 1.4;
    }
    .variant-tradeoff {
      font-size: 0.72rem;
      color: #94a3b8;
      font-style: italic;
      margin-bottom: 0.85rem;
      line-height: 1.4;
    }
    .variant-tradeoff::before { content: "trade · "; opacity: 0.6; font-style: normal; }
    .variant-body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80px;
      flex: 1;
    }
    .tune-panel {
      margin-top: 1rem;
      padding: 0.75rem;
      border-top: 1px dashed #e5e2e2;
      display: flex; flex-direction: column; gap: 0.4rem;
      font-family: ui-monospace, monospace;
      font-size: 0.72rem;
      color: #475569;
    }
    .tune-row { display: grid; grid-template-columns: 90px 1fr 56px; align-items: center; gap: 0.5rem; }
    .tune-row.tune-toggle { grid-template-columns: 90px auto; }
    .tune-row input[type=range] { width: 100%; accent-color: var(--primary); }
    .tune-val { text-align: right; color: #1e293b; font-weight: 600; }
    .tune-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .copy-prompt {
      background: var(--primary); color: #fff; border: 0;
      padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer;
      font: inherit; font-weight: 600;
    }
    .copy-prompt:hover { filter: brightness(1.08); }
    .reset { background: transparent; color: #94a3b8; border: 0; cursor: pointer; font: inherit; }
    .reset:hover { color: #475569; }
    .snippet {
      margin-top: 0.75rem;
      border-top: 1px dashed #e5e2e2;
      padding-top: 0.5rem;
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
    }
    .snippet summary {
      cursor: pointer;
      color: #64748b;
      user-select: none;
      padding: 0.25rem 0;
    }
    .snippet summary:hover { color: #1e293b; }
    .snippet pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 0.75rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.5rem 0;
      line-height: 1.45;
    }
    .snippet code { font-family: inherit; }
    .copy-snippet {
      background: transparent;
      border: 1px solid #cbd5e0;
      padding: 0.3rem 0.65rem;
      border-radius: 5px;
      font: inherit;
      cursor: pointer;
      color: #475569;
    }
    .copy-snippet:hover { background: #f8fafc; }
  </style>
</head>
<body>
  <h1 class="topic-h">{{TOPIC}}</h1>
  <p class="hint">Reload <code>Cmd+R</code> after Claude regenerates. Tune sliders &rarr; <code>Copy as prompt</code> &rarr; paste in TUI. Pick in TUI: type <code>B</code> or <code>B tighter padding</code> or <code>go with B</code> (paste copied prompt + <code>go with B</code> to bake tuned values into the handoff).</p>
  <div class="variants-grid">
    {{VARIANTS_HTML}}
  </div>
</body>
</html>
